I can see it — the job box is loading (the two squares icon in the center). The "All jobs" section on the left is empty, which means the workflow itself failed to parse before any job could even start. This is a YAML syntax error in the workflow file you pasted.
The most likely culprit is the ${{ }} expressions — when pasted through the chat, some characters may have gotten mangled. Let me give you a clean, simpler version that avoids the complex expressions.
Go back to the file editor in GitHub (same steps as before — .github/workflows/build.yml → pencil icon) and replace everything with this simpler version:
YAML
name: Build ONE Voice Solution Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Get version from latest tag
        id: version
        shell: powershell
        run: |
          $raw = git describe --tags --abbrev=0 2>$null
          if ($raw -match "^v(.+)$") { $ver = $matches[1] } else { $ver = "5.9" }
          echo "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version: $ver"

      - name: Patch APP_VERSION in source
        shell: powershell
        run: |
          $ver = (Get-Content $env:GITHUB_OUTPUT | Select-String "VERSION=").ToString().Split("=")[1]
          $file = "src\MainFormV5.cs"
          $c = Get-Content $file -Raw
          $c = $c -replace 'private const string APP_VERSION = "[^"]*";', "private const string APP_VERSION = `"$ver`";"
          Set-Content $file $c -NoNewline

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore OneApplication.csproj -PackagesDirectory packages

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: msbuild OneApplication.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\

      - name: Download VB-Audio Cable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer\vbcable | Out-Null
          $url = "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip"
          $zip = "installer\vbcable\vbcable.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath installer\vbcable -Force
          Remove-Item $zip

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Installer
        run: |
          & "C:\Program Files (x86 )\Inno Setup 6\ISCC.exe" installer\ONEVoiceSolution_Setup.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: ONEVoiceSolution-Installer
          path: installer\output\*.exe
          retention-days: 90
This version is simpler and avoids the complex ${{ steps.version.outputs.VERSION }} expressions that were likely causing the YAML parse failure. Copy that, paste it in, commit.
