name: Build ONE Voice Solution Installer

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-latest

    env:
      MSBUILD_VERBOSITY: minimal

    steps:
      # ── 1. Delete ALL old artifacts FIRST to free quota before we need it ────
      - name: Delete old artifacts (free quota)
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            for (const artifact of artifacts) {
              console.log(`Deleting artifact: ${artifact.name} (${artifact.id})`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              } catch(e) { console.log(`Failed: ${e.message}`); }
            }
            console.log(`Deleted ${artifacts.length} artifact(s).`);

      # ── 2. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      # ── 3. Guard: fail fast if any large file (>5 MB) was accidentally committed
      - name: Check for large files in repo
        shell: powershell
        run: |
          $limit = 5MB
          $large = Get-ChildItem -Recurse -File | Where-Object { $_.Length -gt $limit -and $_.FullName -notmatch '\\\.git\\' }
          if ($large) {
            Write-Error "Large files detected in repo (should be in .gitignore):"
            $large | ForEach-Object { Write-Error "  $($_.FullName) ($([math]::Round($_.Length/1MB,1)) MB)" }
            exit 1
          }
          Write-Host "No large files found. Proceeding."

      # ── 4. NuGet + MSBuild ───────────────────────────────────────────────────
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore OneApplication.csproj -PackagesDirectory packages

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release
        run: >
          msbuild OneApplication.csproj
          /p:Configuration=Release
          /p:Platform=AnyCPU
          /p:OutputPath=bin\Release\
          /m
          /nodeReuse:false
          /verbosity:minimal

      # ── 5. Download VB-Audio Cable at build time (never commit it) ───────────
      - name: Download VB-Audio Cable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer\vbcable | Out-Null
          $url = "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip"
          $zip = "installer\vbcable\vbcable.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath installer\vbcable -Force
          Remove-Item $zip

      # ── 6. Inno Setup ────────────────────────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ONEVoiceSolution_Setup.iss

      # ── 7. Extract version ───────────────────────────────────────────────────
      - name: Extract app version
        id: get_version
        shell: powershell
        run: |
          $line = Select-String -Path "src\MainFormV5.cs" -Pattern 'APP_VERSION = "([^"]+)"' | Select-Object -First 1
          $ver  = $line.Matches[0].Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      # ── 8. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: ONE Voice Solution v${{ steps.get_version.outputs.VERSION }}
          files: installer\output\ONEVoiceSolution_Setup.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Upload installer artifact (quota already cleared in step 1) ───────
      - name: Upload Installer Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ONEVoiceSolution-v${{ steps.get_version.outputs.VERSION }}-Installer
          path: installer\output\ONEVoiceSolution_Setup.exe
          retention-days: 3
          compression-level: 0
