name: Build ONE Voice Solution Installer
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3
      - name: Restore NuGet packages
        run: nuget restore OneApplication.csproj -PackagesDirectory packages
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3
      - name: Build Release
        run: msbuild OneApplication.csproj /p:Configuration=Release /p:Platform=AnyCPU /p:OutputPath=bin\Release\
      - name: Download VB-Audio Cable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path installer\vbcable | Out-Null
          $url = "https://download.vb-audio.com/Download_CABLE/VBCABLE_Driver_Pack45.zip"
          $zip = "installer\vbcable\vbcable.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive -Path $zip -DestinationPath installer\vbcable -Force
          Remove-Item $zip
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\ONEVoiceSolution_Setup.iss
      - name: Extract app version
        id: get_version
        shell: powershell
        run: |
          $line = Select-String -Path "src\MainFormV5.cs" -Pattern 'APP_VERSION = "([^"]+)"' | Select-Object -First 1
          $ver  = $line.Matches[0].Groups[1].Value
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: ONE Voice Solution v${{ steps.get_version.outputs.VERSION }}
          files: installer\output\ONEVoiceSolution_Setup.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete old artifacts to prevent quota exhaustion
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            for (const artifact of artifacts) {
              console.log(`Deleting old artifact: ${artifact.name} (${artifact.id})`);
              try {
                await github.rest.actions.deleteArtifact({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  artifact_id: artifact.id,
                });
              } catch(e) { console.log(`Failed to delete ${artifact.id}: ${e.message}`); }
            }
      - name: Upload Installer Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: ONEVoiceSolution-v${{ steps.get_version.outputs.VERSION }}-Installer
          path: installer\output\ONEVoiceSolution_Setup.exe
          retention-days: 3
