The "Commit changes" button is greyed out until you actually make a change to the file content. Here's what's happening — when you select all and try to paste, GitHub's editor may not be registering the change yet.
Try this instead:
Click somewhere inside the file editor first (so the cursor is in the text)
Press Ctrl+A to select all
Press Delete to clear it
Now paste (Ctrl+V) the new content
The "Commit changes" button in the top right should turn green — then click it
If the button is still grey after pasting, try clicking somewhere else in the editor first, then click the button. GitHub needs to detect that the content actually changed before it enables the commit button.
