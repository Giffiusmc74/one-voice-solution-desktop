<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<title>One Voice</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, Arial, sans-serif; }

body {
  background: radial-gradient(circle at center, #070812 0%, #02030a 100%);
  color:white;
}

/* HEADER */
.header {
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:18px 30px;
}

.logo {
  color:#ff2a2a;
  font-weight:bold;
  font-size:26px;
}

.title {
  background:#ff3b3b;
  padding:10px 40px;
  font-size:20px;
  font-weight:600;
  box-shadow:0 0 18px rgba(255,0,0,0.7);
}

/* DIVIDER */
.divider {
  height:4px;
  background:linear-gradient(to right, transparent, #ff3b3b, transparent);
  box-shadow:0 0 18px rgba(255,0,0,0.9);
  margin:10px 0 25px;
}

/* SECTION TITLES */
.section-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  padding:0 60px;
  margin-bottom:5px;
  font-size:13px;
  letter-spacing:1px;
}

.section-row span.red { color:#ff3b3b; }
.section-row span.green { color:#2cff88; }

/* METERS */
.meters {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  padding:0 60px;
  align-items:start;
}

/* RING */
.ring {
  width:200px;
  height:200px;
  margin:auto;
  position:relative;
}

.ring svg {
  transform:rotate(-90deg);
}

/* OUTER SOFT GLOW */
.outer-glow {
  stroke:currentColor;
  stroke-width:10;
  opacity:0.15;
}

/* CHUNK SEGMENTS */
.segment-ring {
  stroke:currentColor;
  stroke-width:12;
  stroke-dasharray:28 16;
  opacity:0.7;
}

/* INNER TICKS */
.ticks {
  stroke:#9aa0aa;
  stroke-width:2;
  stroke-dasharray:2 6;
  opacity:0.5;
}

/* MAIN PROGRESS */
.progress {
  stroke-width:14;
  fill:none;
  stroke-linecap:round;
  filter:drop-shadow(0 0 10px currentColor);
}

/* INNER CORE */
.ring::before {
  content:"";
  position:absolute;
  width:120px;
  height:120px;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle, #000 35%, #070707 70%, transparent);
  border-radius:50%;
}

/* CENTER */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:24px;
  font-weight:600;
  padding:6px 12px;
  border-radius:5px;
  background:rgba(0,0,0,0.65);
  box-shadow:0 0 12px currentColor;
}

/* COLORS */
.red { color:#ff3b3b; }
.blue { color:#3ba3ff; }
.purple { color:#b26bff; }
.green { color:#2cff88; }

/* LABEL */
.label {
  text-align:center;
  margin-top:8px;
  font-size:12px;
}

/* CONTROLS */
.controls {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.control {
  width:48px;
  height:38px;
  border:2px solid currentColor;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

/* FOOTER */
.footer {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:40px;
}

.btn {
  padding:14px 40px;
  border:2px solid currentColor;
  background:transparent;
  font-size:14px;
  filter:drop-shadow(0 0 6px currentColor);
  color:white;
  cursor:pointer;
}

.version {
  text-align:center;
  margin-top:15px;
  color:#777;
  font-size:12px;
}
</style>

</head>

<body>

<div class="header">
  <div class="logo">ONE VOICE</div>
  <div class="title">The Geniusness Is In The Simplicity</div>
  <div></div>
</div>

<div class="divider"></div>

<div class="section-row">
  <div>WHAT THE <span class="red">AGENT</span> HEARS</div>
  <div>WHAT THE <span class="green">CUSTOMER</span> HEARS</div>
</div>

<div class="meters">

  <!-- RED -->
  <div class="red">
    <div class="ring">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="90" class="outer-glow"/>
        <circle cx="100" cy="100" r="82" class="segment-ring"/>
        <circle cx="100" cy="100" r="68" class="ticks"/>
        <circle cx="100" cy="100" r="65"
          class="progress"
          stroke="currentColor"
          stroke-dasharray="408"
          stroke-dashoffset="82"/>
      </svg>
      <div class="center">80%</div>
    </div>
    <div class="label">CUSTOMER VOICE</div>
    <div class="controls">
      <div class="control">-</div>
      <div class="control">-3</div>
      <div class="control">+</div>
    </div>
  </div>

  <!-- BLUE -->
  <div class="blue">
    <div class="ring">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="90" class="outer-glow"/>
        <circle cx="100" cy="100" r="82" class="segment-ring"/>
        <circle cx="100" cy="100" r="68" class="ticks"/>
        <circle cx="100" cy="100" r="65"
          class="progress"
          stroke="currentColor"
          stroke-dasharray="408"
          stroke-dashoffset="33"/>
      </svg>
      <div class="center">92%</div>
    </div>
    <div class="label">AGENT RECORDINGS</div>
    <div class="controls">
      <div class="control">-</div>
      <div class="control">-3</div>
      <div class="control">+</div>
    </div>
  </div>

  <!-- PURPLE -->
  <div class="purple">
    <div class="ring">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="90" class="outer-glow"/>
        <circle cx="100" cy="100" r="82" class="segment-ring"/>
        <circle cx="100" cy="100" r="68" class="ticks"/>
        <circle cx="100" cy="100" r="65"
          class="progress"
          stroke="currentColor"
          stroke-dasharray="408"
          stroke-dashoffset="49"/>
      </svg>
      <div class="center">88%</div>
    </div>
    <div class="label">AGENT VOICE</div>
    <div class="controls">
      <div class="control">-</div>
      <div class="control">-3</div>
      <div class="control">+</div>
    </div>
  </div>

  <!-- GREEN -->
  <div class="green">
    <div class="ring">
      <svg width="200" height="200">
        <circle cx="100" cy="100" r="90" class="outer-glow"/>
        <circle cx="100" cy="100" r="82" class="segment-ring"/>
        <circle cx="100" cy="100" r="68" class="ticks"/>
        <circle cx="100" cy="100" r="65"
          class="progress"
          stroke="currentColor"
          stroke-dasharray="408"
          stroke-dashoffset="20"/>
      </svg>
      <div class="center">95%</div>
    </div>
    <div class="label">AGENT RECORDINGS</div>
    <div class="controls">
      <div class="control">-</div>
      <div class="control">-3</div>
      <div class="control">+</div>
    </div>
  </div>

</div>

<div class="footer">
  <button class="btn red">🎤 Headset Microphone</button>
  <button class="btn blue">🔊 Headset Earphone</button>
</div>

<div class="version">One United Global LLC 2026 v7.31</div>

</body>
</html>
